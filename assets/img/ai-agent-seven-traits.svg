<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="768" viewBox="0 0 1024 768" role="img" aria-labelledby="title desc">
  <title id="title">AI / Agent 的 7 个特性</title>
  <desc id="desc">一张透明背景、文字可复制的 SVG 信息图：AI / Agent 是一种低成本、全天候、可并行的智力杠杆；七个特性分为智力供给、执行杠杆和机会结构。</desc>

  <defs>
    <style>
      text {
        font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", "Noto Sans CJK SC", "Helvetica Neue", Arial, sans-serif;
        fill: #18343a;
      }
      .title { font-size: 30px; font-weight: 760; }
      .claim { font-size: 15px; fill: #596362; }
      .group-title { font-size: 19px; font-weight: 760; }
      .node-title { font-size: 19px; font-weight: 760; }
      .hub-title { font-size: 23px; font-weight: 780; }
      .hub-main { font-size: 30px; font-weight: 800; }
      .caption { font-size: 14px; fill: #3f4e4c; }
      .tiny { font-size: 12px; font-weight: 720; }
      .footer { font-size: 17px; font-weight: 760; fill: #364642; }
      .panel { fill: #f8f7f2; stroke: #d5d1c7; stroke-width: 1.4; }
      .neutral { fill: #f1efe7; stroke: #d5d1c7; stroke-width: 1.4; }
      .blue { fill: #e6f2ff; stroke: #4f8fd6; stroke-width: 1.4; }
      .green { fill: #ddf7ef; stroke: #10a98c; stroke-width: 1.4; }
      .purple { fill: #f0e8ff; stroke: #8b6fd6; stroke-width: 1.4; }
      .yellow { fill: #fff1d9; stroke: #f1a23a; stroke-width: 1.4; }
      .white { fill: #ffffff; stroke: #d5d1c7; stroke-width: 1.1; }
      .blue-text { fill: #1b4d7a; }
      .green-text { fill: #006b61; }
      .purple-text { fill: #4b2e83; }
      .yellow-text { fill: #7a3f00; }
      .muted { fill: #596362; }
      .line { stroke: #74736c; stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .soft-line { stroke: #74736c; stroke-width: 1.4; fill: none; stroke-linecap: round; opacity: 0.42; }
    </style>
  </defs>

  <!-- Header -->
  <text x="512" y="43" text-anchor="middle" class="title">AI / Agent 的 7 个特性</text>
  <text x="512" y="72" text-anchor="middle" class="claim">低成本、全天候、可并行的智力杠杆；价值不只来自“聪明”，也来自成长、执行和机会结构。</text>

  <!-- A. Intelligence supply -->
  <rect x="44" y="94" width="936" height="166" rx="10" class="panel"/>
  <text x="76" y="126" class="group-title blue-text">A. 智力供给</text>
  <text x="197" y="126" class="caption">知识、算力与训练继续把能力密度推高</text>

  <rect x="72" y="144" width="424" height="88" rx="8" class="blue"/>
  <text x="100" y="176" class="node-title blue-text">聪明</text>
  <text x="100" y="201" class="caption">高智力密度：大规模知识</text>
  <text x="100" y="221" class="caption">与算力训练的结果</text>
  <circle cx="462" cy="188" r="18" fill="#ffffff" stroke="#4f8fd6" stroke-width="1.2"/>
  <path d="M 452 190 C 452 181, 471 181, 471 190 C 471 199, 452 199, 452 190" fill="none" stroke="#4f8fd6" stroke-width="1.6"/>
  <path d="M 457 181 L 457 199 M 466 181 L 466 199" class="soft-line"/>

  <rect x="528" y="144" width="424" height="88" rx="8" class="blue"/>
  <text x="556" y="176" class="node-title blue-text">成长</text>
  <text x="556" y="201" class="caption">训练继续推进，模型会进步</text>
  <text x="556" y="221" class="caption">Agent 框架更擅长复杂任务</text>
  <circle cx="918" cy="188" r="18" fill="#ffffff" stroke="#4f8fd6" stroke-width="1.2"/>
  <path d="M 908 194 L 914 188 L 920 192 L 928 181" fill="none" stroke="#4f8fd6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Central hub -->
  <line x1="512" y1="260" x2="512" y2="286" class="line"/>
  <polygon points="512,286 506,276 518,276" fill="#74736c"/>

  <rect x="344" y="286" width="336" height="148" rx="12" class="neutral"/>
  <text x="512" y="325" text-anchor="middle" class="hub-title">AI / Agent</text>
  <text x="512" y="361" text-anchor="middle" class="hub-main">智力杠杆</text>
  <rect x="408" y="379" width="208" height="30" rx="15" class="green"/>
  <text x="512" y="399" text-anchor="middle" class="tiny green-text">低成本 · 全天候 · 可并行</text>
  <text x="512" y="423" text-anchor="middle" class="caption">能力红利 + 执行结构 + 资源窗口</text>

  <!-- C. Opportunity structure -->
  <rect x="64" y="312" width="252" height="100" rx="8" class="purple"/>
  <text x="90" y="338" class="tiny purple-text">C. 机会结构</text>
  <text x="90" y="364" class="node-title purple-text">公平</text>
  <text x="90" y="388" class="caption">优质教育 / 合作资源</text>
  <text x="90" y="407" class="caption">没有敲门砖，也能获得</text>

  <line x1="316" y1="362" x2="344" y2="362" class="line"/>
  <polygon points="344,362 334,356 334,368" fill="#74736c"/>

  <rect x="708" y="312" width="252" height="100" rx="8" class="purple"/>
  <text x="734" y="338" class="tiny purple-text">C. 机会结构</text>
  <text x="734" y="364" class="node-title purple-text">时代红利</text>
  <text x="734" y="388" class="caption">资本、注意力、学者</text>
  <text x="734" y="407" class="caption">和资源都在倾注</text>

  <line x1="708" y1="362" x2="680" y2="362" class="line"/>
  <polygon points="680,362 690,356 690,368" fill="#74736c"/>

  <!-- B. Execution leverage -->
  <line x1="512" y1="462" x2="512" y2="434" class="line"/>
  <polygon points="512,434 506,444 518,444" fill="#74736c"/>

  <rect x="44" y="462" width="936" height="162" rx="10" class="panel"/>
  <text x="76" y="494" class="group-title green-text">B. 执行杠杆</text>
  <text x="199" y="494" class="caption">时间、费用与并行度一起改变任务吞吐</text>

  <rect x="72" y="520" width="280" height="78" rx="8" class="green"/>
  <text x="100" y="550" class="node-title green-text">不用休息</text>
  <text x="100" y="575" class="caption">7*24 小时在线执行</text>
  <circle cx="320" cy="558" r="17" fill="#ffffff" stroke="#10a98c" stroke-width="1.2"/>
  <circle cx="320" cy="558" r="10" fill="none" stroke="#10a98c" stroke-width="1.6"/>
  <path d="M 320 552 L 320 559 L 326 563" fill="none" stroke="#10a98c" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>

  <rect x="372" y="520" width="280" height="78" rx="8" class="green"/>
  <text x="400" y="550" class="node-title green-text">低成本</text>
  <text x="400" y="574" class="caption">$20-$200/月</text>
  <text x="400" y="593" class="caption">不到约1400 RMB/月</text>
  <circle cx="620" cy="558" r="17" fill="#ffffff" stroke="#10a98c" stroke-width="1.2"/>
  <text x="620" y="564" text-anchor="middle" font-size="19" font-weight="760" fill="#006b61">$</text>

  <rect x="672" y="520" width="280" height="78" rx="8" class="green"/>
  <text x="700" y="550" class="node-title green-text">多线程</text>
  <text x="700" y="574" class="caption">同时调用多个 AI Agent</text>
  <text x="700" y="593" class="caption">并行推进任务</text>
  <circle cx="920" cy="558" r="17" fill="#ffffff" stroke="#10a98c" stroke-width="1.2"/>
  <path d="M 910 553 H 930 M 910 558 H 930 M 910 563 H 930" stroke="#10a98c" stroke-width="1.7" stroke-linecap="round"/>
  <path d="M 925 548 L 930 553 L 925 558 M 925 553 L 930 558 L 925 563" fill="none" stroke="#10a98c" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Bottom conclusion -->
  <rect x="72" y="652" width="880" height="76" rx="8" class="yellow"/>
  <text x="512" y="684" text-anchor="middle" class="footer">当智力、时间、协作资源都变得低门槛，真正的差异转向：</text>
  <text x="512" y="711" text-anchor="middle" class="footer">问题选择、判断力和组织执行。</text>
</svg>
