<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="768" viewBox="0 0 1024 768" role="img" aria-labelledby="title desc">
  <title id="title">从一本本书到知识图谱：用问题定向拓宽边界</title>
  <desc id="desc">一张透明背景、文字可复制的 SVG 信息图：展示 AI 学习从一本本书和论文输入，经过结构抽取形成知识图谱，再基于图谱提问，发现缺口并定向拓宽学习边界。</desc>

  <defs>
    <style>
      text {
        font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", "Noto Sans CJK SC", "Helvetica Neue", Arial, sans-serif;
        fill: #18343a;
      }
      .title { font-size: 30px; font-weight: 760; }
      .subtitle { font-size: 15px; fill: #596362; }
      .section { font-size: 17px; font-weight: 760; }
      .label { font-size: 15px; font-weight: 720; }
      .small { font-size: 12.5px; fill: #3f4e4c; }
      .tiny { font-size: 11.5px; fill: #596362; }
      .caption { font-size: 16px; font-weight: 720; fill: #364642; }
      .muted { fill: #596362; }
      .card { fill: #f1efe7; stroke: #d5d1c7; stroke-width: 1.4; }
      .blue { fill: #e6f2ff; stroke: #4f8fd6; }
      .yellow { fill: #fff1d9; stroke: #f1a23a; }
      .green { fill: #ddf7ef; stroke: #10a98c; }
      .purple { fill: #f0e8ff; stroke: #8b6fd6; }
      .line { stroke: #74736c; stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .soft-line { stroke: #74736c; stroke-width: 1.5; fill: none; stroke-linecap: round; stroke-linejoin: round; opacity: 0.75; }
      .graph-line { stroke: #74736c; stroke-width: 1.7; fill: none; opacity: 0.72; }
      .dash { stroke-dasharray: 7 7; }
    </style>
  </defs>

  <!-- Header -->
  <text x="512" y="48" text-anchor="middle" class="title">从一本本书到知识图谱：用问题定向拓宽边界</text>
  <text x="512" y="78" text-anchor="middle" class="subtitle">AI 把“综合大量材料并提取结构”的成本压低，学习瓶颈转向：能不能问出好问题。</text>

  <!-- Flow labels -->
  <text x="128" y="128" text-anchor="middle" class="section" fill="#7a3f00">输入材料</text>
  <text x="304" y="128" text-anchor="middle" class="section" fill="#1b4d7a">结构抽取</text>
  <text x="520" y="128" text-anchor="middle" class="section" fill="#18343a">知识图谱</text>
  <text x="748" y="128" text-anchor="middle" class="section" fill="#4b2e83">基于图谱提问</text>
  <text x="880" y="128" text-anchor="middle" class="section" fill="#006b61">扩展边界</text>

  <!-- Source stack card -->
  <rect x="44" y="150" width="166" height="300" rx="8" class="yellow"/>
  <text x="127" y="178" text-anchor="middle" class="label" fill="#7a3f00">先读够量</text>
  <text x="127" y="200" text-anchor="middle" class="small">一本一本读</text>
  <text x="127" y="218" text-anchor="middle" class="small">一章一章啃</text>

  <!-- Book stack -->
  <g transform="translate(73 246)">
    <rect x="0" y="96" width="104" height="32" rx="5" fill="#ffffff" stroke="#f1a23a" stroke-width="1.3"/>
    <rect x="7" y="64" width="104" height="32" rx="5" fill="#fffaf0" stroke="#f1a23a" stroke-width="1.3"/>
    <rect x="-2" y="32" width="104" height="32" rx="5" fill="#ffffff" stroke="#f1a23a" stroke-width="1.3"/>
    <rect x="9" y="0" width="104" height="32" rx="5" fill="#fffaf0" stroke="#f1a23a" stroke-width="1.3"/>
    <line x1="18" y1="16" x2="88" y2="16" stroke="#f1a23a" stroke-width="1"/>
    <line x1="13" y1="48" x2="82" y2="48" stroke="#f1a23a" stroke-width="1"/>
    <line x1="22" y1="80" x2="94" y2="80" stroke="#f1a23a" stroke-width="1"/>
    <line x1="14" y1="112" x2="87" y2="112" stroke="#f1a23a" stroke-width="1"/>
  </g>
  <text x="127" y="395" text-anchor="middle" class="small">书 / 论文 / 讲义</text>
  <text x="127" y="417" text-anchor="middle" class="tiny">传统假设：理解会自然涌现</text>

  <!-- Arrow to extraction -->
  <line x1="218" y1="300" x2="254" y2="300" class="line"/>
  <polygon points="254,300 244,294 244,306" fill="#74736c"/>

  <!-- Extraction card -->
  <rect x="260" y="202" width="126" height="196" rx="8" class="blue"/>
  <text x="323" y="232" text-anchor="middle" class="label" fill="#1b4d7a">AI 结构抽取</text>
  <rect x="280" y="257" width="86" height="30" rx="15" fill="#ffffff" stroke="#4f8fd6" stroke-width="1"/>
  <text x="323" y="277" text-anchor="middle" class="small">概念</text>
  <rect x="280" y="300" width="86" height="30" rx="15" fill="#ffffff" stroke="#4f8fd6" stroke-width="1"/>
  <text x="323" y="320" text-anchor="middle" class="small">关系</text>
  <rect x="280" y="343" width="86" height="30" rx="15" fill="#ffffff" stroke="#4f8fd6" stroke-width="1"/>
  <text x="323" y="363" text-anchor="middle" class="small">争议</text>

  <!-- Arrow to graph -->
  <line x1="394" y1="300" x2="426" y2="300" class="line"/>
  <polygon points="426,300 416,294 416,306" fill="#74736c"/>

  <!-- Knowledge graph card -->
  <rect x="432" y="150" width="176" height="300" rx="8" class="card"/>
  <text x="520" y="179" text-anchor="middle" class="label">知识图谱</text>
  <text x="520" y="202" text-anchor="middle" class="tiny">先拿地图，再决定往哪走</text>

  <!-- Graph network -->
  <g>
    <line x1="520" y1="290" x2="475" y2="250" class="graph-line"/>
    <line x1="520" y1="290" x2="568" y2="246" class="graph-line"/>
    <line x1="520" y1="290" x2="470" y2="340" class="graph-line"/>
    <line x1="520" y1="290" x2="572" y2="344" class="graph-line"/>
    <line x1="475" y1="250" x2="568" y2="246" class="graph-line"/>
    <line x1="470" y1="340" x2="572" y2="344" class="graph-line"/>
    <line x1="568" y1="246" x2="572" y2="344" class="graph-line"/>

    <circle cx="520" cy="290" r="28" fill="#e6f2ff" stroke="#4f8fd6" stroke-width="1.6"/>
    <text x="520" y="286" text-anchor="middle" class="tiny">核心</text>
    <text x="520" y="301" text-anchor="middle" class="tiny">模型</text>

    <circle cx="475" cy="250" r="24" fill="#ffffff" stroke="#d5d1c7" stroke-width="1.5"/>
    <text x="475" y="255" text-anchor="middle" class="tiny">概念</text>

    <circle cx="568" cy="246" r="26" fill="#fff1d9" stroke="#f1a23a" stroke-width="1.5"/>
    <text x="568" y="251" text-anchor="middle" class="tiny">争议</text>

    <circle cx="470" cy="340" r="25" fill="#ddf7ef" stroke="#10a98c" stroke-width="1.5"/>
    <text x="470" y="345" text-anchor="middle" class="tiny">证据</text>

    <circle cx="572" cy="344" r="27" fill="#f0e8ff" stroke="#8b6fd6" stroke-width="1.5"/>
    <text x="572" y="340" text-anchor="middle" class="tiny">开放</text>
    <text x="572" y="355" text-anchor="middle" class="tiny">问题</text>
  </g>

  <rect x="464" y="395" width="112" height="32" rx="16" fill="#ffffff" stroke="#d5d1c7" stroke-width="1"/>
  <text x="520" y="416" text-anchor="middle" class="small">全貌变成可导航对象</text>

  <!-- Arrow to questions -->
  <line x1="616" y1="300" x2="650" y2="300" class="line"/>
  <polygon points="650,300 640,294 640,306" fill="#74736c"/>

  <!-- Question card -->
  <rect x="656" y="164" width="180" height="224" rx="8" class="purple"/>
  <text x="746" y="194" text-anchor="middle" class="label" fill="#4b2e83">从图谱里发问</text>
  <rect x="680" y="218" width="132" height="33" rx="16.5" fill="#ffffff" stroke="#8b6fd6" stroke-width="1"/>
  <text x="746" y="240" text-anchor="middle" class="small">核心模型是什么？</text>
  <rect x="680" y="264" width="132" height="33" rx="16.5" fill="#ffffff" stroke="#8b6fd6" stroke-width="1"/>
  <text x="746" y="286" text-anchor="middle" class="small">专家哪里不同意？</text>
  <rect x="680" y="310" width="132" height="33" rx="16.5" fill="#ffffff" stroke="#8b6fd6" stroke-width="1"/>
  <text x="746" y="332" text-anchor="middle" class="small">哪些题暴露伪理解？</text>
  <text x="746" y="366" text-anchor="middle" class="tiny">问题不是检索入口</text>
  <text x="746" y="382" text-anchor="middle" class="tiny">而是组织知识的工具</text>

  <!-- Arrow to boundary -->
  <path d="M 840 300 C 856 300, 862 300, 873 300" class="line"/>
  <polygon points="873,300 863,294 863,306" fill="#74736c"/>

  <!-- Boundary expansion -->
  <rect x="874" y="164" width="116" height="224" rx="8" class="green"/>
  <text x="932" y="194" text-anchor="middle" class="label" fill="#006b61">定向扩边</text>
  <circle cx="932" cy="282" r="40" fill="#ffffff" stroke="#10a98c" stroke-width="1.6"/>
  <circle cx="932" cy="282" r="63" fill="none" stroke="#10a98c" stroke-width="1.7" stroke-dasharray="6 6"/>
  <circle cx="958" cy="244" r="8" fill="#fff1d9" stroke="#f1a23a" stroke-width="1.4"/>
  <circle cx="905" cy="322" r="7" fill="#f0e8ff" stroke="#8b6fd6" stroke-width="1.4"/>
  <text x="932" y="278" text-anchor="middle" class="tiny">已知</text>
  <text x="932" y="293" text-anchor="middle" class="tiny">地图</text>
  <text x="932" y="355" text-anchor="middle" class="small">缺口 → 下一批材料</text>
  <text x="932" y="375" text-anchor="middle" class="tiny">边界被有方向地拓宽</text>

  <!-- Feedback loop -->
  <path d="M 932 406 C 900 494, 728 515, 524 506 C 345 498, 202 484, 127 457" class="soft-line dash"/>
  <polygon points="127,457 139,455 134,466" fill="#74736c" opacity="0.82"/>
  <rect x="396" y="478" width="254" height="42" rx="8" fill="#f1efe7" stroke="#d5d1c7" stroke-width="1.2"/>
  <text x="523" y="504" text-anchor="middle" class="small">错题 / 空白 / 争议点，反向指定下一轮阅读</text>

  <!-- Bottom comparison band -->
  <rect x="58" y="564" width="908" height="120" rx="8" fill="#f1efe7" stroke="#d5d1c7" stroke-width="1.4"/>
  <text x="99" y="594" class="label" fill="#7a3f00">旧瓶颈</text>
  <text x="184" y="594" class="small">接触足够多的信息</text>
  <line x1="342" y1="588" x2="438" y2="588" class="line"/>
  <polygon points="438,588 428,582 428,594" fill="#74736c"/>
  <text x="475" y="594" class="label" fill="#006b61">新瓶颈</text>
  <text x="560" y="594" class="small">问出好问题来组织信息</text>

  <line x1="86" y1="627" x2="938" y2="627" stroke="#d5d1c7" stroke-width="1"/>
  <text x="512" y="657" text-anchor="middle" class="caption">读材料不再是线性堆量，而是围绕图谱不断提问、验证缺口、定向补资料。</text>

  <!-- Small direction tags -->
  <rect x="78" y="702" width="188" height="34" rx="8" fill="#fff1d9" stroke="#f1a23a" stroke-width="1.2"/>
  <text x="172" y="724" text-anchor="middle" class="small">材料：提供事实和例子</text>
  <rect x="305" y="702" width="188" height="34" rx="8" fill="#e6f2ff" stroke="#4f8fd6" stroke-width="1.2"/>
  <text x="399" y="724" text-anchor="middle" class="small">图谱：暴露结构和关系</text>
  <rect x="532" y="702" width="188" height="34" rx="8" fill="#f0e8ff" stroke="#8b6fd6" stroke-width="1.2"/>
  <text x="626" y="724" text-anchor="middle" class="small">问题：发现盲区和争议</text>
  <rect x="759" y="702" width="188" height="34" rx="8" fill="#ddf7ef" stroke="#10a98c" stroke-width="1.2"/>
  <text x="853" y="724" text-anchor="middle" class="small">扩边：只补最该补的东西</text>
</svg>
