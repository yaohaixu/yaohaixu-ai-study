<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="768" viewBox="0 0 1024 768" role="img" aria-labelledby="title desc">
  <title id="title">成长 -&gt; 工具本身升值的复利</title>
  <desc id="desc">一张透明背景、文字可复制的 SVG 信息图：对照普通工具买来后价值固定或磨损，与 AI Agent 工作流在模型升级后自动产出更高质量内容，说明早期搭建的系统、Prompt 经验和工作流会随工具升级被放大。</desc>

  <defs>
    <style>
      text {
        font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", "Noto Sans CJK SC", "Helvetica Neue", Arial, sans-serif;
        fill: #18343a;
      }
      .title { font-size: 30px; font-weight: 760; }
      .claim { font-size: 15px; fill: #596362; }
      .panel-title { font-size: 20px; font-weight: 760; }
      .node-title { font-size: 18px; font-weight: 760; }
      .node-caption { font-size: 13.5px; fill: #3f4e4c; }
      .small { font-size: 12.5px; fill: #596362; }
      .tiny { font-size: 11.5px; fill: #596362; }
      .badge { font-size: 12px; font-weight: 760; }
      .footer { font-size: 20px; font-weight: 760; fill: #364642; }
      .panel { fill: #f1efe7; stroke: #d5d1c7; stroke-width: 1.4; }
      .neutral { fill: #ffffff; stroke: #d5d1c7; stroke-width: 1.2; }
      .yellow { fill: #fff1d9; stroke: #f1a23a; stroke-width: 1.4; }
      .green { fill: #ddf7ef; stroke: #10a98c; stroke-width: 1.4; }
      .blue { fill: #e6f2ff; stroke: #4f8fd6; stroke-width: 1.4; }
      .purple { fill: #f0e8ff; stroke: #8b6fd6; stroke-width: 1.4; }
      .line { stroke: #74736c; stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .soft-line { stroke: #74736c; stroke-width: 1.45; fill: none; stroke-linecap: round; stroke-linejoin: round; opacity: 0.72; }
      .dashed { stroke-dasharray: 6 7; }
      .yellow-text { fill: #7a3f00; }
      .green-text { fill: #006b61; }
      .blue-text { fill: #1b4d7a; }
      .purple-text { fill: #4b2e83; }
    </style>
  </defs>

  <!-- Header -->
  <text x="512" y="47" text-anchor="middle" class="title">成长 -&gt; 工具本身升值的复利</text>
  <text x="512" y="77" text-anchor="middle" class="claim">普通工具不会随时间变聪明；Agent 工作流会自动吃到模型升级红利。</text>

  <!-- Main comparison frame -->
  <rect x="52" y="108" width="920" height="532" rx="8" class="panel"/>
  <line x1="80" y1="344" x2="944" y2="344" class="soft-line dashed"/>

  <!-- Top lane: ordinary tool -->
  <text x="82" y="145" class="panel-title yellow-text">普通工具：价值固定 / 磨损</text>
  <rect x="768" y="124" width="146" height="28" rx="14" class="yellow"/>
  <text x="841" y="143" text-anchor="middle" class="badge yellow-text">买来就是成品</text>
  <text x="82" y="172" class="small">锤子十年后仍是那把锤子，最多被维护，不会自己升级能力。</text>

  <rect x="96" y="202" width="162" height="82" rx="8" class="yellow"/>
  <text x="177" y="233" text-anchor="middle" class="node-title yellow-text">今年买锤子</text>
  <text x="177" y="257" text-anchor="middle" class="node-caption">一次性交付</text>

  <line x1="258" y1="243" x2="302" y2="243" class="line"/>
  <polygon points="302,243 293,238 293,248" fill="#74736c"/>

  <rect x="304" y="202" width="162" height="82" rx="8" class="neutral"/>
  <text x="385" y="233" text-anchor="middle" class="node-title">明年继续用</text>
  <text x="385" y="257" text-anchor="middle" class="node-caption">能力没有跃迁</text>

  <line x1="466" y1="243" x2="510" y2="243" class="line"/>
  <polygon points="510,243 501,238 501,248" fill="#74736c"/>

  <rect x="512" y="202" width="162" height="82" rx="8" class="neutral"/>
  <text x="593" y="233" text-anchor="middle" class="node-title">十年后</text>
  <text x="593" y="257" text-anchor="middle" class="node-caption">还是那把锤子</text>

  <line x1="674" y1="243" x2="718" y2="243" class="line"/>
  <polygon points="718,243 709,238 709,248" fill="#74736c"/>

  <rect x="720" y="202" width="208" height="82" rx="8" class="yellow"/>
  <text x="824" y="233" text-anchor="middle" class="node-title yellow-text">回报趋平</text>
  <text x="824" y="257" text-anchor="middle" class="node-caption">固定效率 + 自然磨损</text>

  <path d="M 105 305 C 250 301, 380 302, 535 302 S 804 306, 925 304" class="soft-line"/>
  <polygon points="925,304 916,299 916,309" fill="#74736c" opacity="0.72"/>
  <text x="515" y="326" text-anchor="middle" class="tiny">普通工具的回报率主要由你的使用时间决定，工具本身不会替你升值。</text>

  <!-- Bottom lane: Agent workflow -->
  <text x="82" y="381" class="panel-title green-text">AI Agent：同一套工作流自动升值</text>
  <rect x="744" y="360" width="170" height="28" rx="14" class="green"/>
  <text x="829" y="379" text-anchor="middle" class="badge green-text">模型升级 = 免费增益</text>
  <text x="82" y="408" class="small">早期搭建的系统、Prompt 经验、模板和检查清单，会跟着更强模型一起放大。</text>

  <rect x="80" y="442" width="184" height="102" rx="8" class="blue"/>
  <text x="172" y="470" text-anchor="middle" class="badge blue-text">今年</text>
  <text x="172" y="497" text-anchor="middle" class="node-title blue-text">搭建工作流</text>
  <text x="172" y="521" text-anchor="middle" class="node-caption">Claude 内容生产流程</text>

  <line x1="264" y1="493" x2="310" y2="493" class="line"/>
  <polygon points="310,493 301,488 301,498" fill="#74736c"/>

  <rect x="312" y="442" width="166" height="102" rx="8" class="blue"/>
  <text x="395" y="470" text-anchor="middle" class="badge blue-text">明年</text>
  <text x="395" y="497" text-anchor="middle" class="node-title blue-text">模型升级</text>
  <text x="395" y="521" text-anchor="middle" class="node-caption">推理更稳，能力更强</text>

  <line x1="478" y1="493" x2="524" y2="493" class="line"/>
  <polygon points="524,493 515,488 515,498" fill="#74736c"/>

  <rect x="526" y="442" width="184" height="102" rx="8" class="green"/>
  <text x="618" y="470" text-anchor="middle" class="badge green-text">同样流程</text>
  <text x="618" y="497" text-anchor="middle" class="node-title green-text">更高质量</text>
  <text x="618" y="521" text-anchor="middle" class="node-caption">不重做系统也变好</text>

  <line x1="710" y1="493" x2="756" y2="493" class="line"/>
  <polygon points="756,493 747,488 747,498" fill="#74736c"/>

  <rect x="758" y="426" width="190" height="134" rx="8" class="purple"/>
  <text x="853" y="459" text-anchor="middle" class="badge purple-text">未来</text>
  <text x="853" y="489" text-anchor="middle" class="node-title purple-text">早期资产被放大</text>
  <text x="853" y="515" text-anchor="middle" class="node-caption">系统 / Prompt / 数据</text>
  <text x="853" y="538" text-anchor="middle" class="node-caption">随工具一起升值</text>

  <path d="M 99 602 C 255 600, 405 596, 548 589 S 781 575, 918 566" stroke="#10a98c" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <polygon points="918,566 907,562 910,574" fill="#10a98c"/>
  <text x="286" y="584" text-anchor="middle" class="tiny">固定投入</text>
  <text x="573" y="573" text-anchor="middle" class="tiny">升级红利</text>
  <text x="822" y="614" text-anchor="middle" class="badge green-text">回报率自动上升</text>

  <!-- Bottom conclusion -->
  <rect x="72" y="666" width="880" height="70" rx="8" fill="#f1efe7" stroke="#d5d1c7" stroke-width="1.4"/>
  <text x="512" y="696" text-anchor="middle" class="footer">你的投入固定，工具回报率自动上升。</text>
  <text x="512" y="720" text-anchor="middle" class="small">越早搭建 Agent 工作流，未来免费升级红利越多。</text>
</svg>
