<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="768" viewBox="0 0 1024 768" role="img" aria-labelledby="title desc">
  <title id="title">Fail Fast 的进化机制</title>
  <desc id="desc">一张课程信息图，展示 AI 降低失败成本后，如何通过变异、真实反馈选择、经验遗传，形成下一轮更准确的进化闭环。</desc>

  <defs>
    <style>
      text {
        font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", "Noto Sans CJK SC", "Helvetica Neue", Arial, sans-serif;
        fill: #17343a;
      }
      .title { font-size: 30px; font-weight: 780; }
      .subtitle { font-size: 15px; fill: #5f6f70; }
      .panel-title { font-size: 20px; font-weight: 760; }
      .step-title { font-size: 18px; font-weight: 760; }
      .body { font-size: 14px; fill: #425456; }
      .small { font-size: 12px; fill: #657476; }
      .tiny { font-size: 11px; fill: #657476; }
      .panel { fill: #f8fbfb; stroke: #d7eeee; stroke-width: 1.4; }
      .side-panel { fill: #fff9ee; stroke: #f1c27a; stroke-width: 1.4; }
      .card { fill: #ffffff; stroke: #d8e5e5; stroke-width: 1.2; }
      .teal-card { fill: #e8fbf7; stroke: #10a98c; stroke-width: 1.5; }
      .blue-card { fill: #eaf4ff; stroke: #4f8fd6; stroke-width: 1.5; }
      .orange-card { fill: #fff2e5; stroke: #f29b49; stroke-width: 1.5; }
      .purple-card { fill: #f1eaff; stroke: #8b6fd6; stroke-width: 1.5; }
      .green-card { fill: #eef9e7; stroke: #76a85a; stroke-width: 1.5; }
      .teal { fill: #007f78; }
      .blue { fill: #235b91; }
      .orange { fill: #a65312; }
      .purple { fill: #4b2e83; }
      .green { fill: #4d7331; }
      .muted { fill: #5f6f70; }
      .line { fill: none; stroke: #6f7777; stroke-width: 2.4; stroke-linecap: round; stroke-linejoin: round; }
      .soft-line { fill: none; stroke: #9aa6a6; stroke-width: 1.5; stroke-linecap: round; stroke-dasharray: 6 7; }
      .loop-line { fill: none; stroke: #009688; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; }
      .chip { font-size: 12px; font-weight: 720; }
      .result { font-size: 17px; font-weight: 760; }
    </style>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M 0 0 L 9 4.5 L 0 9 Z" fill="#6f7777"/>
    </marker>
    <marker id="teal-arrow" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M 0 0 L 9 4.5 L 0 9 Z" fill="#009688"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1024" height="768" rx="0" fill="#f7fcff"/>
  <g opacity="0.36" stroke="#d9eeee" stroke-width="1">
    <path d="M80 96 H944 M80 176 H944 M80 256 H944 M80 336 H944 M80 416 H944 M80 496 H944 M80 576 H944 M80 656 H944"/>
    <path d="M112 72 V696 M192 72 V696 M272 72 V696 M352 72 V696 M432 72 V696 M512 72 V696 M592 72 V696 M672 72 V696 M752 72 V696 M832 72 V696 M912 72 V696"/>
  </g>

  <text x="512" y="54" text-anchor="middle" class="title">Fail Fast 的进化机制</text>
  <text x="512" y="84" text-anchor="middle" class="subtitle">廉价失败只有接上选择和遗传，才会从“多试几次”变成“系统变强”。</text>

  <rect x="48" y="118" width="650" height="548" rx="16" class="panel"/>
  <text x="78" y="156" class="panel-title teal">有闭环：每次失败都进入下一轮</text>
  <text x="78" y="181" class="small">AI 负责扩大变异池，真实世界负责选择，你的记录系统负责遗传。</text>

  <path d="M244 270 C306 198, 430 190, 508 252" class="loop-line" marker-end="url(#teal-arrow)"/>
  <path d="M596 342 C638 434, 574 538, 468 558" class="loop-line" marker-end="url(#teal-arrow)"/>
  <path d="M328 552 C218 520, 164 404, 204 310" class="loop-line" marker-end="url(#teal-arrow)"/>

  <rect x="174" y="222" width="180" height="102" rx="12" class="blue-card"/>
  <text x="264" y="254" text-anchor="middle" class="step-title blue">1 失败成本下降</text>
  <text x="264" y="281" text-anchor="middle" class="body">AI 降低时间、金钱</text>
  <text x="264" y="303" text-anchor="middle" class="small">和心理负担</text>

  <rect x="428" y="222" width="190" height="102" rx="12" class="teal-card"/>
  <text x="523" y="254" text-anchor="middle" class="step-title teal">2 变异增多</text>
  <text x="523" y="281" text-anchor="middle" class="body">更多方案、表达</text>
  <text x="523" y="303" text-anchor="middle" class="small">原型和假设</text>

  <rect x="486" y="392" width="180" height="108" rx="12" class="orange-card"/>
  <text x="576" y="426" text-anchor="middle" class="step-title orange">3 真实反馈选择</text>
  <text x="576" y="453" text-anchor="middle" class="body">发布、使用、购买</text>
  <text x="576" y="475" text-anchor="middle" class="small">市场给出筛选信号</text>

  <rect x="214" y="432" width="204" height="116" rx="12" class="purple-card"/>
  <text x="316" y="466" text-anchor="middle" class="step-title purple">4 经验遗传</text>
  <text x="316" y="493" text-anchor="middle" class="body">复盘、账号、记录</text>
  <text x="316" y="515" text-anchor="middle" class="small">系统记忆写回下一轮</text>

  <circle cx="390" cy="374" r="66" fill="#ffffff" stroke="#d7eeee" stroke-width="1.4"/>
  <circle cx="390" cy="374" r="45" fill="#e8fbf7" stroke="#10a98c" stroke-width="1.3"/>
  <text x="390" y="366" text-anchor="middle" class="step-title teal">进化复利</text>
  <text x="390" y="392" text-anchor="middle" class="small teal">判断越来越准</text>

  <rect x="116" y="584" width="520" height="48" rx="12" class="green-card"/>
  <text x="376" y="614" text-anchor="middle" class="result green">结果：下一轮不是从零开始，而是带着更准的假设继续试。</text>

  <rect x="728" y="118" width="248" height="548" rx="16" class="side-panel"/>
  <text x="752" y="156" class="panel-title orange">没有遗传机制</text>
  <text x="752" y="181" class="small">尝试次数很多，但每次都孤立。</text>

  <rect x="752" y="220" width="200" height="56" rx="10" class="card"/>
  <text x="774" y="244" class="step-title orange">第 1 次</text>
  <text x="774" y="265" class="tiny">生成方案，反馈没有写回</text>

  <path d="M852 286 V310" class="soft-line"/>
  <line x1="836" y1="298" x2="868" y2="298" class="soft-line"/>

  <rect x="752" y="320" width="200" height="56" rx="10" class="card"/>
  <text x="774" y="344" class="step-title orange">第 37 次</text>
  <text x="774" y="365" class="tiny">还是从零开始判断</text>

  <path d="M852 386 V410" class="soft-line"/>
  <line x1="836" y1="398" x2="868" y2="398" class="soft-line"/>

  <rect x="752" y="420" width="200" height="56" rx="10" class="card"/>
  <text x="774" y="444" class="step-title orange">第 82 次</text>
  <text x="774" y="465" class="tiny">用户信号和经验断档</text>

  <path d="M852 486 V510" class="soft-line"/>
  <line x1="836" y1="498" x2="868" y2="498" class="soft-line"/>

  <rect x="752" y="520" width="200" height="56" rx="10" class="card"/>
  <text x="774" y="544" class="step-title orange">第 100 次</text>
  <text x="774" y="565" class="tiny">数量变多，判断没变准</text>

  <rect x="752" y="602" width="200" height="38" rx="10" class="orange-card"/>
  <text x="852" y="626" text-anchor="middle" class="chip orange">多试 ≠ 进化</text>

  <path d="M698 394 H728" class="line" marker-end="url(#arrow)"/>
  <text x="713" y="378" text-anchor="middle" class="tiny muted">对比</text>

  <text x="512" y="716" text-anchor="middle" class="result teal">Fail Fast 不是失败更多次，而是让失败经过选择、遗传，变成下一轮的结构性优势。</text>
</svg>
