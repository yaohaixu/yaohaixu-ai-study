<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="768" viewBox="0 0 1024 768" role="img" aria-labelledby="title desc">
  <title id="title">AI 学习：从积累信息到构建结构</title>
  <desc id="desc">基于 NotebookLM/MIT viral anecdote 提炼的学习路径信息图。强调故事未证实，只取方法论：学习瓶颈从接触信息迁移到问题质量。</desc>

  <defs>
    <style>
      text {
        font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", "Noto Sans CJK SC", "Helvetica Neue", Arial, sans-serif;
        fill: #18343a;
      }
      .title { font-size: 30px; font-weight: 760; }
      .subtitle { font-size: 15px; fill: #596362; }
      .panel-title { font-size: 21px; font-weight: 720; }
      .card-title { font-size: 19px; font-weight: 720; }
      .card-body { font-size: 15px; fill: #4d5c5a; }
      .small { font-size: 13px; fill: #6a6b64; }
      .caption { font-size: 16px; font-weight: 620; fill: #364642; }
      .result-title { font-size: 22px; font-weight: 780; fill: #4b2e83; }
      .result-text { font-size: 19px; font-weight: 700; }
      .arrow { stroke: #74736c; stroke-width: 2.2; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .dashed { stroke-dasharray: 7 8; }
    </style>
    <marker id="arrowhead" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L8,4 L0,8 Z" fill="#74736c"/>
    </marker>
  </defs>

  <!-- Header -->
  <text x="512" y="52" text-anchor="middle" class="title">AI 学习：从积累信息到构建结构</text>
  <text x="512" y="82" text-anchor="middle" class="subtitle">未证实 MIT / NotebookLM viral anecdote：不采信故事事实，只提炼可复用学习方法</text>

  <!-- Main panels -->
  <rect x="48" y="120" width="424" height="464" rx="8" fill="#f1efe7" stroke="#d5d1c7" stroke-width="1.5"/>
  <rect x="552" y="120" width="424" height="464" rx="8" fill="#f1efe7" stroke="#d5d1c7" stroke-width="1.5"/>
  <line x1="512" y1="124" x2="512" y2="582" class="arrow dashed"/>

  <text x="260" y="160" text-anchor="middle" class="panel-title">旧学习假设</text>
  <text x="764" y="160" text-anchor="middle" class="panel-title">AI 学习路径</text>

  <!-- Left lane: old assumption -->
  <rect x="84" y="190" width="352" height="72" rx="8" fill="#fff1d9" stroke="#f1a23a" stroke-width="1.5"/>
  <text x="260" y="222" text-anchor="middle" class="card-title" fill="#7a3f00">积累信息</text>
  <text x="260" y="245" text-anchor="middle" class="card-body">一章一章读，一本一本啃</text>

  <line x1="260" y1="266" x2="260" y2="294" class="arrow" marker-end="url(#arrowhead)"/>

  <rect x="84" y="300" width="352" height="72" rx="8" fill="#fff1d9" stroke="#f1a23a" stroke-width="1.5"/>
  <text x="260" y="332" text-anchor="middle" class="card-title" fill="#7a3f00">等待理解涌现</text>
  <text x="260" y="355" text-anchor="middle" class="card-body">读够量后，全貌慢慢拼出来</text>

  <line x1="260" y1="376" x2="260" y2="404" class="arrow" marker-end="url(#arrowhead)"/>

  <rect x="84" y="410" width="352" height="78" rx="8" fill="#fff1d9" stroke="#f1a23a" stroke-width="1.5"/>
  <text x="260" y="442" text-anchor="middle" class="card-title" fill="#7a3f00">一个学期拼地图</text>
  <text x="260" y="465" text-anchor="middle" class="card-body">共识、争议、开放问题靠自己摸索</text>

  <rect x="112" y="505" width="296" height="32" rx="16" fill="#ffffff" stroke="#f1a23a" stroke-width="1.2"/>
  <text x="260" y="526" text-anchor="middle" class="caption">瓶颈：接触足够多的信息</text>

  <!-- Right lane: AI learning path -->
  <rect x="606" y="184" width="316" height="54" rx="8" fill="#f1efe7" stroke="#d5d1c7" stroke-width="1.5"/>
  <text x="764" y="207" text-anchor="middle" class="card-title">大量材料</text>
  <text x="764" y="226" text-anchor="middle" class="card-body">书 / 论文 / 讲义进入同一上下文</text>

  <line x1="764" y1="242" x2="764" y2="266" class="arrow" marker-end="url(#arrowhead)"/>

  <rect x="606" y="272" width="316" height="54" rx="8" fill="#e6f2ff" stroke="#4f8fd6" stroke-width="1.5"/>
  <text x="764" y="295" text-anchor="middle" class="card-title" fill="#1b4d7a">结构提问</text>
  <text x="764" y="314" text-anchor="middle" class="card-body">心智模型、争议地图、强论据</text>

  <line x1="764" y1="330" x2="764" y2="354" class="arrow" marker-end="url(#arrowhead)"/>

  <rect x="606" y="360" width="316" height="54" rx="8" fill="#f0e8ff" stroke="#8b6fd6" stroke-width="1.5"/>
  <text x="764" y="383" text-anchor="middle" class="card-title" fill="#4b2e83">领域地图</text>
  <text x="764" y="402" text-anchor="middle" class="card-body">先看清共识、分歧、开放问题</text>

  <line x1="764" y1="418" x2="764" y2="442" class="arrow" marker-end="url(#arrowhead)"/>

  <rect x="606" y="448" width="316" height="54" rx="8" fill="#e6f2ff" stroke="#4f8fd6" stroke-width="1.5"/>
  <text x="764" y="471" text-anchor="middle" class="card-title" fill="#1b4d7a">深度问题</text>
  <text x="764" y="490" text-anchor="middle" class="card-body">区分真正理解与只是背事实</text>

  <line x1="764" y1="506" x2="764" y2="524" class="arrow" marker-end="url(#arrowhead)"/>

  <rect x="606" y="530" width="316" height="54" rx="8" fill="#ddf7ef" stroke="#10a98c" stroke-width="1.5"/>
  <text x="764" y="553" text-anchor="middle" class="card-title" fill="#006b61">错题缺口</text>
  <text x="764" y="572" text-anchor="middle" class="card-body">解释为什么错、到底缺什么</text>

  <!-- Bottom bottleneck shift -->
  <rect x="80" y="602" width="864" height="104" rx="8" fill="#f0e8ff" stroke="#8b6fd6" stroke-width="1.6"/>
  <text x="512" y="634" text-anchor="middle" class="result-title">瓶颈迁移</text>

  <rect x="132" y="654" width="286" height="36" rx="18" fill="#fff1d9" stroke="#f1a23a" stroke-width="1.3"/>
  <text x="275" y="678" text-anchor="middle" class="result-text" fill="#7a3f00">接触足够多的信息</text>

  <line x1="438" y1="672" x2="580" y2="672" class="arrow" marker-end="url(#arrowhead)"/>
  <text x="509" y="663" text-anchor="middle" class="small">AI 降低综合成本</text>

  <rect x="606" y="654" width="286" height="36" rx="18" fill="#ddf7ef" stroke="#10a98c" stroke-width="1.3"/>
  <text x="749" y="678" text-anchor="middle" class="result-text" fill="#006b61">问出好问题组织信息</text>

  <text x="512" y="732" text-anchor="middle" class="small">核心 claim：不是更快堆内容，而是先拿结构，再用问题逼近理解。</text>
</svg>
