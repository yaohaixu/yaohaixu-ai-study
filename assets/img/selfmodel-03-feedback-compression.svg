<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="768" viewBox="0 0 1024 768" role="img" aria-labelledby="title desc">
  <title id="title">第三层：反馈周期压缩</title>
  <desc id="desc">一张透明背景、文字可复制的 SVG 信息图：AI 把反馈周期从年缩短到天甚至当下；偏离越早被拉回，行为矫正成本越低。关键句：行为矫正成本和偏离时间成正比；偏离一天一句提醒，偏离一个月要重建习惯，偏离一年可能质变。</desc>

  <defs>
    <style>
      text {
        font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", "Noto Sans CJK SC", "Helvetica Neue", Arial, sans-serif;
        fill: #18343a;
      }
      .title { font-size: 29px; font-weight: 780; }
      .claim { font-size: 15px; fill: #596362; }
      .panel-title { font-size: 21px; font-weight: 780; }
      .section-title { font-size: 18px; font-weight: 780; }
      .node-title { font-size: 16px; font-weight: 760; }
      .body { font-size: 13px; fill: #3f4e4c; }
      .small { font-size: 12px; fill: #596362; }
      .tiny { font-size: 11px; fill: #596362; }
      .footer { font-size: 18px; font-weight: 800; fill: #006b61; }
      .panel { fill: #f8f7f2; stroke: #d5d1c7; stroke-width: 1.4; }
      .column { fill: #ffffff; stroke: #d5d1c7; stroke-width: 1.2; }
      .neutral { fill: #f1efe7; stroke: #d5d1c7; stroke-width: 1.4; }
      .yellow { fill: #fff1d9; stroke: #f1a23a; stroke-width: 1.4; }
      .yellow-soft { fill: #fffaf0; stroke: #f1a23a; stroke-width: 1.1; }
      .blue { fill: #e6f2ff; stroke: #4f8fd6; stroke-width: 1.4; }
      .blue-soft { fill: #f4f9ff; stroke: #4f8fd6; stroke-width: 1.1; }
      .purple { fill: #f0e8ff; stroke: #8b6fd6; stroke-width: 1.4; }
      .green { fill: #ddf7ef; stroke: #10a98c; stroke-width: 1.4; }
      .green-soft { fill: #f3fffb; stroke: #10a98c; stroke-width: 1.1; }
      .yellow-text { fill: #7a3f00; }
      .blue-text { fill: #1b4d7a; }
      .purple-text { fill: #4b2e83; }
      .green-text { fill: #006b61; }
      .muted-text { fill: #596362; }
      .divider { stroke: #d5d1c7; stroke-width: 1.2; stroke-dasharray: 6 8; }
      .arrow { stroke: #74736c; stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .arrow-soft { stroke: #74736c; stroke-width: 1.6; fill: none; stroke-dasharray: 5 7; stroke-linecap: round; stroke-linejoin: round; }
      .arrow-green { stroke: #10a98c; stroke-width: 2.3; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .axis { stroke: #74736c; stroke-width: 1.8; fill: none; stroke-linecap: round; }
      .grid { stroke: #d5d1c7; stroke-width: 1; fill: none; stroke-dasharray: 4 7; }
      .curve { stroke: #f1a23a; stroke-width: 3; fill: none; stroke-linecap: round; stroke-linejoin: round; }
    </style>
    <marker id="arrowGray" markerWidth="8" markerHeight="8" refX="8" refY="4" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M 0 0 L 8 4 L 0 8 Z" fill="#74736c"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="8" refX="8" refY="4" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M 0 0 L 8 4 L 0 8 Z" fill="#10a98c"/>
    </marker>
    <marker id="arrowOrange" markerWidth="8" markerHeight="8" refX="8" refY="4" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M 0 0 L 8 4 L 0 8 Z" fill="#f1a23a"/>
    </marker>
  </defs>

  <text x="512" y="42" text-anchor="middle" class="title">第三层：反馈周期压缩</text>
  <text x="512" y="72" text-anchor="middle" class="claim">AI 把反馈周期从年缩短到天甚至当下；偏离越早被拉回，行为矫正成本越低。</text>
  <text x="512" y="96" text-anchor="middle" class="claim">反馈越贴近行为，越像实时偏航校正，而不是事后审判。</text>

  <rect x="44" y="118" width="936" height="382" rx="10" class="panel"/>
  <text x="74" y="154" class="panel-title">长反馈周期 vs 短反馈周期</text>
  <text x="74" y="179" class="body">同一件事，差别不在“有没有反馈”，而在反馈出现时，偏离已经累积了多久。</text>

  <line x1="512" y1="190" x2="512" y2="474" class="divider"/>
  <rect x="432" y="282" width="160" height="58" rx="9" class="blue-soft"/>
  <text x="512" y="306" text-anchor="middle" class="node-title blue-text">反馈前移</text>
  <text x="512" y="328" text-anchor="middle" class="body blue-text">从结果到行为</text>

  <rect x="76" y="204" width="396" height="264" rx="10" class="column"/>
  <rect x="96" y="224" width="166" height="42" rx="8" class="yellow"/>
  <text x="179" y="250" text-anchor="middle" class="node-title yellow-text">长反馈周期</text>
  <text x="292" y="251" class="small muted-text">结果暴露后才改</text>

  <rect x="98" y="304" width="132" height="76" rx="8" class="neutral"/>
  <text x="164" y="329" text-anchor="middle" class="node-title">日常偏离</text>
  <text x="164" y="351" text-anchor="middle" class="body">消费、作息</text>
  <text x="164" y="371" text-anchor="middle" class="body">持续累积</text>

  <path d="M 230 342 C 264 326, 279 286, 312 266" class="arrow-soft" marker-end="url(#arrowGray)"/>
  <path d="M 230 342 C 264 358, 279 398, 312 418" class="arrow-soft" marker-end="url(#arrowGray)"/>
  <text x="264" y="325" text-anchor="middle" class="tiny">数月 / 一年沉默</text>

  <rect x="314" y="226" width="130" height="78" rx="8" class="yellow"/>
  <text x="379" y="252" text-anchor="middle" class="node-title yellow-text">年底财务复盘</text>
  <text x="379" y="274" text-anchor="middle" class="body yellow-text">才吓一跳</text>
  <text x="379" y="293" text-anchor="middle" class="body yellow-text">预算早已失控</text>

  <rect x="314" y="382" width="130" height="72" rx="8" class="yellow"/>
  <text x="379" y="407" text-anchor="middle" class="node-title yellow-text">体检报告</text>
  <text x="379" y="429" text-anchor="middle" class="body yellow-text">才知道问题</text>
  <text x="379" y="448" text-anchor="middle" class="body yellow-text">指标已经偏离</text>

  <rect x="98" y="410" width="174" height="44" rx="8" class="yellow-soft"/>
  <text x="185" y="429" text-anchor="middle" class="body yellow-text">反馈来得太晚</text>
  <text x="185" y="447" text-anchor="middle" class="body yellow-text">矫正变成补账</text>

  <rect x="552" y="204" width="396" height="264" rx="10" class="column"/>
  <rect x="572" y="224" width="166" height="42" rx="8" class="green"/>
  <text x="655" y="250" text-anchor="middle" class="node-title green-text">短反馈周期</text>
  <text x="768" y="251" class="small muted-text">行为发生时就拉回</text>

  <rect x="574" y="292" width="128" height="70" rx="8" class="blue"/>
  <text x="638" y="318" text-anchor="middle" class="node-title blue-text">消费刚下单</text>
  <text x="638" y="340" text-anchor="middle" class="body blue-text">订单信号出现</text>

  <path d="M 702 327 L 746 327" class="arrow-green" marker-end="url(#arrowGreen)"/>
  <text x="724" y="313" text-anchor="middle" class="tiny green-text">当下</text>

  <rect x="756" y="292" width="164" height="70" rx="8" class="green"/>
  <text x="838" y="318" text-anchor="middle" class="node-title green-text">提醒预算</text>
  <text x="838" y="340" text-anchor="middle" class="body green-text">还没形成亏空</text>

  <rect x="574" y="380" width="128" height="74" rx="8" class="blue"/>
  <text x="638" y="406" text-anchor="middle" class="node-title blue-text">连续三天</text>
  <text x="638" y="428" text-anchor="middle" class="body blue-text">没有运动</text>

  <path d="M 702 417 L 746 417" class="arrow-green" marker-end="url(#arrowGreen)"/>
  <text x="724" y="403" text-anchor="middle" class="tiny green-text">天级</text>

  <rect x="756" y="376" width="164" height="82" rx="8" class="purple"/>
  <text x="838" y="402" text-anchor="middle" class="node-title purple-text">结合日程判断</text>
  <text x="838" y="424" text-anchor="middle" class="body purple-text">赶项目？</text>
  <text x="838" y="443" text-anchor="middle" class="body purple-text">还是惰性？</text>

  <rect x="44" y="524" width="936" height="204" rx="10" class="panel"/>
  <text x="74" y="559" class="panel-title">偏离时间 → 矫正成本</text>

  <rect x="74" y="574" width="236" height="142" rx="9" class="neutral"/>
  <text x="192" y="600" text-anchor="middle" class="section-title">关键句</text>
  <text x="98" y="626" class="body">行为矫正成本</text>
  <text x="98" y="646" class="body">和偏离时间成正比；</text>
  <text x="98" y="666" class="body">偏离一天一句提醒，</text>
  <text x="98" y="686" class="body">偏离一个月要重建习惯，</text>
  <text x="98" y="706" class="body">偏离一年可能质变。</text>

  <line x1="350" y1="692" x2="916" y2="692" class="axis"/>
  <line x1="350" y1="692" x2="350" y2="574" class="axis"/>
  <polygon points="924,692 914,686 914,698" fill="#74736c"/>
  <polygon points="350,566 344,576 356,576" fill="#74736c"/>
  <text x="356" y="584" class="small muted-text">成本</text>
  <text x="812" y="717" class="small muted-text">偏离时间</text>

  <line x1="350" y1="650" x2="916" y2="650" class="grid"/>
  <line x1="350" y1="610" x2="916" y2="610" class="grid"/>
  <line x1="472" y1="574" x2="472" y2="692" class="grid"/>
  <line x1="650" y1="574" x2="650" y2="692" class="grid"/>
  <line x1="830" y1="574" x2="830" y2="692" class="grid"/>

  <path d="M 372 678 C 468 676, 540 650, 618 624 C 718 590, 794 572, 900 590" class="curve" marker-end="url(#arrowOrange)"/>

  <rect x="382" y="626" width="128" height="44" rx="8" class="green"/>
  <text x="446" y="645" text-anchor="middle" class="node-title green-text">偏离一天</text>
  <text x="446" y="663" text-anchor="middle" class="body green-text">一句提醒</text>

  <rect x="566" y="586" width="162" height="46" rx="8" class="yellow"/>
  <text x="647" y="606" text-anchor="middle" class="node-title yellow-text">偏离一个月</text>
  <text x="647" y="624" text-anchor="middle" class="body yellow-text">要重建习惯</text>

  <rect x="764" y="536" width="146" height="48" rx="8" class="purple"/>
  <text x="837" y="557" text-anchor="middle" class="node-title purple-text">偏离一年</text>
  <text x="837" y="576" text-anchor="middle" class="body purple-text">可能质变</text>

  <text x="512" y="752" text-anchor="middle" class="footer">压缩反馈周期，本质是在成本变大前把人拉回正轨。</text>
</svg>
